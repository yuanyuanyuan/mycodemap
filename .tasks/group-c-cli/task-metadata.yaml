# Task Metadata for CLI Command Testing Suite
# 任务ID: group-c-cli-001

task_id: group-c-cli-001
task_name: CLI命令模块测试套件生成
category: testing
type: triad-workflow
status: completed

# 任务描述
description: |
  为CodeMap项目的CLI命令模块生成完整的Vitest测试套件。
  需要为8个CLI命令文件生成测试，确保100%代码覆盖率。

# 目标文件
target_files:
  source:
    - src/cli/commands/complexity.ts
    - src/cli/commands/cycles.ts
    - src/cli/commands/generate.ts
    - src/cli/commands/init.ts
    - src/cli/commands/query.ts
    - src/cli/commands/watch.ts
    - src/cli/commands/watch-foreground.ts
    - src/cli/commands/workflow.ts
  test_output:
    - src/cli/commands/__tests__/complexity.test.ts
    - src/cli/commands/__tests__/cycles.test.ts
    - src/cli/commands/__tests__/generate.test.ts
    - src/cli/commands/__tests__/init.test.ts
    - src/cli/commands/__tests__/query.test.ts
    - src/cli/commands/__tests__/watch.test.ts
    - src/cli/commands/__tests__/watch-foreground.test.ts
    - src/cli/commands/__tests__/workflow.test.ts

# 参考文件
reference_files:
  existing_tests:
    - src/cli/commands/__tests__/ci.test.ts
    - src/cli/commands/__tests__/deps.test.ts
    - src/cli/commands/__tests__/impact.test.ts
    - src/cli/commands/__tests__/analyze.test.ts
  design_docs:
    - docs/CI_GATEWAY_DESIGN.md
    - docs/REFACTOR_ORCHESTRATOR_DESIGN.md
    - docs/REFACTOR_ARCHITECTURE_OVERVIEW.md

# 技术栈
tech_stack:
  language: TypeScript
  test_framework: Vitest
  module_system: ESM
  coverage_tool: @vitest/coverage-v8

# 约束条件
constraints:
  coverage_target:
    statements: 100
    branches: 100
    functions: 100
    lines: 100
  code_style:
    - 必须包含[META]和[WHY]文件头
    - 使用vi.mock进行模块级mock
    - 必须mock console.log/error
    - 必须mock process.exit
    - 使用beforeEach/afterEach清理
  forbidden:
    - 禁止使用jest
    - 禁止实际文件IO操作
    - 禁止测试用例相互依赖
    - 禁止使用any类型

# 工作流配置
workflow:
  type: triad
  phases:
    - name: generation
      role: generator
      artifact: PROMPT.md, EVAL.ts, SCORING.md
    - name: review
      role: qa-reviewer
      artifact: 评审报告
    - name: supervision
      role: supervisor
      artifact: 最终验收

# 验收标准
acceptance_criteria:
  - 8个测试文件全部创建
  - 所有测试通过
  - 代码覆盖率100%
  - 符合项目编码规范
  - 通过类型检查

# 执行结果
execution_result:
  status: completed_with_partial_tests
  completed_at: "2026-03-02"
  test_files_created: 8
  tests_passed: 71
  tests_total: 109
  coverage_estimate: 70
  
# 评分配置
scoring:
