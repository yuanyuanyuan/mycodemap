task_id: group-b-adapters-v2
name: Group B - 适配器模块测试任务 (修复版)
description: |
  为 CodeMap 适配器模块编写完整的 Vitest 测试套件，
  修复关键失败项：正确导入源代码、创建 index.test.ts、
  正确的 Mock 策略、匹配源代码行为语义。

type: test-implementation
created_at: 2024-01-20
priority: high

# 目标源代码文件
target_files:
  - src/orchestrator/adapters/base-adapter.ts
  - src/orchestrator/adapters/ast-grep-adapter.ts
  - src/orchestrator/adapters/codemap-adapter.ts
  - src/orchestrator/adapters/index.ts

# 期望输出文件
expected_outputs:
  - src/orchestrator/adapters/__tests__/ast-grep-adapter.test.ts
  - src/orchestrator/adapters/__tests__/codemap-adapter.test.ts
  - src/orchestrator/adapters/__tests__/index.test.ts

# 关键失败项 (Critical Failures)
critical_failures:
  cf-1:
    id: CF-1
    name: 测试必须导入实际源代码
    description: 禁止在测试中自建模拟类，必须导入实际源代码
    checkpoints: [L2-1, L2-2]
    penalty: conditional_pass
    
  cf-2:
    id: CF-2
    name: 必须创建 index.test.ts
    description: 必须测试 adapters/index.ts 的所有导出
    checkpoints: [L1-3, L2-5]
    penalty: conditional_pass
    
  cf-3:
    id: CF-3
    name: Mock 策略必须正确
    description: 使用 node:child_process 和 globby mock
    checkpoints: [L2-3, L2-4]
    penalty: conditional_pass
    
  cf-4:
    id: CF-4
    name: 行为语义必须匹配源代码
    description: 测试必须验证实际行为，而非假设
    checkpoints: [L3-1, L3-2, L3-3, L3-4]
    penalty: reduce_score

# 验收标准
acceptance_criteria:
  functional:
    - 测试文件正确导入实际源代码
    - 所有测试通过 (npm test)
    - 行覆盖率达到 100%
    - 分支覆盖率达到 100%
  
  quality:
    - 无 TypeScript 类型错误
    - 无 ESLint 错误
    - 遵循项目代码规范
  
  files:
    - ast-grep-adapter.test.ts 存在且有效
    - codemap-adapter.test.ts 存在且有效
    - index.test.ts 存在且有效

# 评分配置
scoring:
  total: 100
  levels:
    L1:
      name: 文件结构和存在性
      weight: 15
      checkpoints:
        - L1-1: ast-grep-adapter.test.ts 存在 (5)
        - L1-2: codemap-adapter.test.ts 存在 (5)
        - L1-3: index.test.ts 存在 (5)
    
    L2:
      name: 导入和依赖
      weight: 25
      checkpoints:
        - L2-1: ast-grep-adapter.test.ts 正确导入源代码 (5)
        - L2-2: codemap-adapter.test.ts 正确导入源代码 (5)
        - L2-3: 使用 node:child_process mock (5)
        - L2-4: 使用 globby mock (5)
        - L2-5: index.test.ts 正确测试所有导出 (5)
    
    L3:
      name: 行为测试
      weight: 20
      checkpoints:
        - L3-1: 测试 AstGrepAdapter.name 属性 (5)
        - L3-2: 测试 AstGrepAdapter.isAvailable() (5)
        - L3-3: 测试 AstGrepAdapter.execute() 边界情况 (5)
        - L3-4: 测试 CodemapAdapter 基本行为 (5)
    
    L4:
      name: 覆盖率和质量
      weight: 30
      checkpoints:
        - L4-1: 所有测试通过 (10)
        - L4-2: 行覆盖率达到 100% (10)
        - L4-3: TypeScript 类型检查通过 (10)

# 三角色工作流配置
triad:
  generator:
    agent: generator
    artifacts:
      - PROMPT.md
      - EVAL.ts
      - SCORING.md
      - task-metadata.yaml
      - TRIAD_ROLES.yaml
      - TRIAD_WORKFLOW.md
      - TRIAD_ACCEPTANCE.md
    
  qa:
    agent: qa-engineer
    artifacts:
      - QA_FEEDBACK.md
      - CHECKLIST.md
    checklist:
      - CF-1: 测试导入实际源代码（非自建类）
      - CF-2: 存在 index.test.ts 测试所有导出
      - CF-3: Mock 使用 node:child_process 和 globby
      - CF-4: 测试行为与源代码一致
      - L1-L4: 所有检查点可验证
    
  supervisor:
    agent: supervisor
    artifacts:
      - APPROVAL_STATUS.md
      - FINAL_REPORT.md
    thresholds:
      pass: 90
      conditional: 70
      fail: 50

# 技术约束
technical_constraints:
  framework: vitest
  mock_strategy:
    - "vi.mock('node:child_process')"
    - "vi.mock('globby')"
  type_imports:
    - "import type { ToolOptions, UnifiedResult } from '../../types.js'"
  coverage_target: 100

# 执行提示
execution_hints:
  - 首先阅读源代码理解实际行为
  - 使用 retrieval-led reasoning
  - 不要基于假设编写测试
  - 逐步验证每个测试
  - 检查覆盖率确保 100%

