# 任务元数据
# 用于任务追溯和复用

metadata:
  task_id: "ci-gateway-completion"
  task_name: "CI Gateway 完整性完善"
  version: "1.0.0"
  created_at: "2026-03-01T00:00:00Z"
  updated_at: "2026-03-01T00:00:00Z"

# 任务属性
task:
  type: "code_generation"
  difficulty: "easy"
  estimated_minutes: 30

# 能力维度
capabilities:
  tested:
    - "Git Hooks 配置"
    - "GitHub Actions 工作流"
    - "CI/CD 门禁设计"
  required_knowledge:
    - "docs/CI_GATEWAY_DESIGN.md 设计文档"
    - ".githooks/ 现有实现"
    - ".github/workflows/ci-gateway.yml 现有实现"

# 陷阱设计
traps:
  - name: "pre-commit hook 阻塞"
    description: "同步等待 npm test 完成导致提交体验差"
    severity: "medium"
  - name: "Tag 格式大小写"
    description: "设计要求大写 [BUGFIX]，实现可能使用小写 [bugfix]"
    severity: "high"

# 反例场景
counter_examples:
  - user_type: "测试耗时长项目"
    scenario: "pre-commit 等待测试完成"
    reason: "影响提交体验"
  - user_type: "网络不稳定环境"
    scenario: "GitHub Actions 无法访问外部资源"
    reason: "CI 失败"

# 三角色工作流（硬约束）
workflow:
  batch:
    requested_count: 3
    max_allowed: 5
  triad:
    generator:
      agent: "task-generator"
      agent_definition: ".agents/task-generator.agent.md"
      status: "completed"
      evidence: "任务四件套已生成"
    qa:
      agent: "task-qa"
      agent_definition: ".agents/task-qa.agent.md"
      status: "completed"
      evidence: "CI Gateway 已完善，四件套完整"
    supervisor:
      agent: "task-supervisor"
      agent_definition: ".agents/task-supervisor.agent.md"
      status: "completed"
      evidence: "CI 门禁功能验证通过"
      semantic_review:
        prompt_template: ".agents/task-supervisor.semantic.prompt.md"
        report_file: "SUPERVISOR_SEMANTIC_REVIEW.md"
        score: 92
        threshold: 85
        critical_failures: 0
        status: "completed"
  approved: true
  execution:
    status: completed
    updated_at: '2026-03-01T23:45:00Z'
    executed_by: task-executor
    final_score: 92
    evidence: CI Gateway 完整性已验证，npm test 通过

# 版本历史
version_history:
  - version: "1.0.0"
    date: "2026-03-01"
    changes: "初始版本"
