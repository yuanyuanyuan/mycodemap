# Task Metadata for Workflow Module Test Suite Generation
# Task ID: group-d-workflow-001

metadata:
  id: group-d-workflow-001
  name: "Workflow Module Test Suite Generation"
  description: "Generate comprehensive Vitest test suite for 6 workflow orchestrator modules"
  version: "1.0.0"
  created_at: "2025-01-20"
  
  # Task Classification
  category: "test-generation"
  priority: "high"
  complexity: "high"
  
  # Target Modules (6 source files)
  target_modules:
    - path: "src/orchestrator/workflow/config.ts"
      test_file: "src/orchestrator/workflow/__tests__/config.test.ts"
      priority: medium
      lines_of_code: ~100
      
    - path: "src/orchestrator/workflow/types.ts"
      test_file: "src/orchestrator/workflow/__tests__/types.test.ts"
      priority: low
      lines_of_code: ~250
      
    - path: "src/orchestrator/workflow/workflow-context.ts"
      test_file: "src/orchestrator/workflow/__tests__/workflow-context.test.ts"
      priority: high
      lines_of_code: ~135
      key_functions:
        - WorkflowContextFactory.create
        - WorkflowContextFactory.validate
        - WorkflowContextFactory.createPhaseArtifacts
        - WorkflowContextValidator.canProceed
        - WorkflowContextValidator.isValidStatusTransition
        
    - path: "src/orchestrator/workflow/phase-checkpoint.ts"
      test_file: "src/orchestrator/workflow/__tests__/phase-checkpoint.test.ts"
      priority: high
      lines_of_code: ~100
      key_functions:
        - PhaseCheckpoint.validate
        - PhaseCheckpoint.validateAll
        - PhaseCheckpoint.getSummary
        
    - path: "src/orchestrator/workflow/workflow-persistence.ts"
      test_file: "src/orchestrator/workflow/__tests__/workflow-persistence.test.ts"
      priority: high
      lines_of_code: ~165
      key_functions:
        - WorkflowPersistence.save
        - WorkflowPersistence.load
        - WorkflowPersistence.loadActive
        - WorkflowPersistence.list
        - WorkflowPersistence.delete
        
    - path: "src/orchestrator/workflow/workflow-orchestrator.ts"
      test_file: "src/orchestrator/workflow/__tests__/workflow-orchestrator.test.ts"
      priority: critical
      lines_of_code: ~480
      key_functions:
        - WorkflowOrchestrator.start
        - WorkflowOrchestrator.executeCurrentPhase
        - WorkflowOrchestrator.proceedToNextPhase
        - WorkflowOrchestrator.getStatus
        - WorkflowOrchestrator.resume
        - WorkflowOrchestrator.checkpoint
        - WorkflowOrchestrator.getGuidance

  # Technical Requirements
  technical_requirements:
    test_framework: "vitest"
    coverage_target:
      lines: 100
      branches: 100
      functions: 100
    mocking_strategy: "vi.mock for modules, vi.fn for functions"
    file_system_mocking: required
    
  # Dependencies to Mock
  mock_dependencies:
    - module: "node:fs"
      methods:
        - promises.access
        - promises.mkdir
        - promises.readFile
        - promises.writeFile
        - promises.readdir
        - promises.unlink
        
    - module: "../tool-orchestrator.js"
      classes:
        - ToolOrchestrator
      
    - module: "../intent-router.js"
      classes:
        - IntentRouter
        
    - module: "../result-fusion.js"
      classes:
        - ResultFusion
        
    - module: "../confidence.js"
      functions:
        - calculateConfidence

  # Design References
  design_references:
    - path: "docs/REFACTOR_ORCHESTRATOR_DESIGN.md"
      section: "8. 工作流编排器设计"
      relevance: high
      
    - path: "docs/REFACTOR_REQUIREMENTS.md"
      section: "9. 工作流编排器设计"
      relevance: high

  # Workflow Configuration
  workflow:
    type: "triad"
    phases:
      - name: "generation"
        role: "generator"
        output: "task-suite"
        
      - name: "qa-review"
        role: "qa"
        checks:
          - test-completeness
          - coverage-analysis
          - edge-case-identification
          - mock-appropriateness
          
      - name: "supervision"
        role: "supervisor"
        checks:
          - quality-gate
          - acceptance-criteria
          - final-approval

  # Constraints
  constraints:
    - "All test files must be in src/orchestrator/workflow/__tests__/"
    - "Test files must use .test.ts extension"
    - "Must use vi.mock() at top level for module mocking"
    - "Must include retrieval-led reasoning instruction"
    - "Tests must not depend on actual file system"
    - "Each test file should be independently runnable"

  # Success Criteria
  success_criteria:
    coverage:
      lines: ">= 90%"
      branches: ">= 85%"
      functions: ">= 95%"
    test_count:
      minimum: 30
      target: 50
    phases_tested: 6
    
  # Anti-Patterns
  anti_patterns:
    - "Testing private methods"
    - "Using real file system operations"
    - "Test order dependencies"
    - "Mocking external APIs"
    - "Tests that don't verify behavior"

  # Additional Notes
  notes: |
    The workflow module implements a state machine with 6 phases:
    reference → impact → risk → implementation → commit → ci
    
    Key testing challenges:
    1. State machine transition validation (12 valid transitions)
    2. Map/Set/Date serialization in persistence layer
    3. Mocking complex dependencies (ToolOrchestrator, IntentRouter, ResultFusion)
    4. Async operation handling throughout
    
    Prefer retrieval-led reasoning over pre-training-led reasoning.
    Always refer to actual source code when evaluating tests.

