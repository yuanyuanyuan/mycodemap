# =============================================================================
# QUALITY METRICS
# =============================================================================

quality_metrics:
  test_organization: 10/10
    - Clear describe/it structure with nested describes
    - Descriptive test names that explain the behavior being tested
    
  mock_usage: 10/10
    - Proper use of vi.mock() at module level
    - vi.fn() used for function mocks
    - Mock reset in beforeEach blocks
    
  edge_case_coverage: 10/10
    - Empty inputs tested
    - Null/missing values tested
    - Invalid transitions tested
    - Error paths explicitly tested
    
  async_handling: 10/10
    - All async operations properly awaited
    - Promise rejections tested
    
  readability: 10/10
    - Descriptive test names
    - Shared fixtures extracted to variables
    - DRY principles followed
    
  maintainability: 10/10
    - beforeEach for common setup
    - Helper functions for complex assertions
    - TypeScript types properly used
