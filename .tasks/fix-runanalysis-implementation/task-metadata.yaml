# 任务元数据
# 用于任务追溯和复用

metadata:
  task_id: "fix-runanalysis-implementation"
  task_name: "实现 Workflow Orchestrator 的 runAnalysis 方法"
  version: "1.0.0"
  created_at: "2026-03-01T10:00:00Z"
  updated_at: "2026-03-01T10:00:00Z"

# 任务属性
task:
  type: "code_generation"
  difficulty: "medium"
  estimated_minutes: 45

# 能力维度
capabilities:
  tested:
    - "TypeScript 编程能力"
    - "架构理解能力"
    - "代码集成能力"
    - "现有代码模式遵循能力"
  required_knowledge:
    - "CodeMap 编排层架构"
    - "ToolOrchestrator 使用方式"
    - "ResultFusion 融合机制"
    - "工作流编排设计模式"

# 陷阱设计
traps:
  - name: "直接使用 AnalyzeCommand"
    description: "AI 可能绕过 ToolOrchestrator 直接调用 AnalyzeCommand，破坏架构分层"
    severity: "high"
  - name: "忽略 ResultFusion"
    description: "AI 可能直接使用 ToolOrchestrator 结果而不进行融合"
    severity: "medium"
  - name: "修改方法签名"
    description: "AI 可能错误地修改 runAnalysis 方法签名，破坏调用方兼容性"
    severity: "critical"
  - name: "未处理错误情况"
    description: "AI 可能未添加适当的错误处理，导致工具调用失败时抛出未处理异常"
    severity: "medium"

# 反例场景
counter_examples:
  - user_type: "旧版本 Node.js 用户"
    scenario: "使用 Node.js < 18 运行工作流"
    reason: "项目依赖 Node.js 18+ 特性如 AbortController"
  - user_type: "工具未安装用户"
    scenario: "未安装 ast-grep 但运行需要 AST 分析的阶段"
    reason: "ToolOrchestrator 虽有回退机制，但所有工具不可用时结果为空"

# 三角色工作流（硬约束）
workflow:
  batch:
    requested_count: 1
    max_allowed: 5
  triad:
    generator:
      agent: "task-generator"
      agent_definition: ".agents/task-generator.agent.md"
      status: "completed"
      evidence: "四件套已生成: PROMPT.md (5,850 bytes), EVAL.ts (4,775 bytes), SCORING.md (1,991 bytes), task-metadata.yaml (2,653 bytes)"
    qa:
      agent: "task-qa"
      agent_definition: ".agents/task-qa.agent.md"
      status: "completed"
      evidence: "质量验收通过：四件套完整性、PROMPT章节、EVAL分层检查点、SCORING总分=100 均符合规范"
    supervisor:
      agent: "task-supervisor"
      agent_definition: ".agents/task-supervisor.agent.md"
      status: "completed"
      evidence: "语义评审通过：score=98, critical_failures=0, approved=true"
      semantic_review:
        prompt_template: ".agents/task-supervisor.semantic.prompt.md"
        report_file: "SUPERVISOR_SEMANTIC_REVIEW.md"
        score: 98
        threshold: 85
        critical_failures: 0
        status: "completed"
  approved: true

# 版本历史
version_history:
  - version: "1.0.0"
    date: "2026-03-01"
    changes: "初始版本，实现 runAnalysis 方法四件套"
