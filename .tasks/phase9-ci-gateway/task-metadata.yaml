# 任务元数据
# 用于任务追溯和复用

metadata:
  task_id: "phase9-ci-gateway"
  task_name: "实现 CI 门禁护栏"
  version: "1.0.0"
  created_at: "2026-03-01T12:00:00Z"
  updated_at: "2026-03-01T12:00:00Z"

# 任务属性
task:
  type: "code_generation"
  difficulty: "medium"
  estimated_minutes: 45

# 能力维度
capabilities:
  tested:
    - Commit 格式验证
    - 文件头注释检查
    - Git Hooks 配置
    - GitHub Actions
  required_knowledge:
    - TypeScript 严格模式
    - conventional commits
    - Git hooks
    - GitHub Actions

# 陷阱设计
traps:
  - name: "仅检查新文件"
    description: "只检查新增文件，忽略修改的存量文件"
    severity: "high"
  - name: "Hook 手动安装"
    description: "Hook 需要用户手动安装"
    severity: "medium"
  - name: "错误无修复建议"
    description: "CI 失败但未提供修复方法"
    severity: "medium"

# 反例场景
counter_examples:
  - user_type: "开发者"
    scenario: "提交不符合规范的 Commit"
    reason: "应返回 E0007 错误并提示正确格式"
  - user_type: "开发者"
    scenario: "代码文件缺少文件头注释"
    reason: "应返回 E0008/E0009 错误"

# 三角色工作流（硬约束）
workflow:
  batch:
    requested_count: 5
    max_allowed: 5
  triad:
    generator:
      agent: "task-generator"
      agent_definition: ".agents/task-generator.agent.md"
      status: "completed"
      evidence: "PROMPT.md generated"
    qa:
      agent: "task-qa"
      agent_definition: ".agents/task-qa.agent.md"
      status: "completed"
      evidence: "四件套验证通过，SCORING总分=100"
    supervisor:
      agent: "task-supervisor"
      agent_definition: ".agents/task-supervisor.agent.md"
      status: "completed"
      evidence: "语义判定通过，semantic_score=91"
      semantic_review:
        prompt_template: ".agents/task-supervisor.semantic.prompt.md"
        report_file: "SUPERVISOR_SEMANTIC_REVIEW.md"
        score: 91
        threshold: 85
        critical_failures: 0
        status: "completed"
  approved: true

# 版本历史
version_history:
  - version: "1.0.0"
    date: "2026-03-01"
    changes: "初始版本"
