name: CI Gateway

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci-gateway:
    name: CI Gateway Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate documentation guardrails
        run: npm run docs:check

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build CLI
        run: npm run build

      - name: Check docs sync via CLI
        run: node dist/cli/index.js ci check-docs-sync

      - name: Check commit format
        run: node dist/cli/index.js ci check-commits --range origin/main..HEAD

      - name: Check commit size
        run: node dist/cli/index.js ci check-commit-size --range origin/main..HEAD

      - name: Check file headers
        run: node dist/cli/index.js ci check-headers

      - name: Generate AI feed and verify sync
        run: |
          node dist/cli/index.js generate
          git diff --exit-code .mycodemap/ai-feed.txt || (echo "ERROR: AI feed is out of sync. Run 'mycodemap generate' and commit changes." && exit 1)

      - name: Assess risk
        run: node dist/cli/index.js ci assess-risk --threshold=0.7

      - name: Check output contract
        run: node dist/cli/index.js ci check-output-contract --schema-version v1.0.0 --top-k 8 --max-tokens 160
