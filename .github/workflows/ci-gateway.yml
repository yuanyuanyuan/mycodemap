name: CI Gateway

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci-gateway:
    name: CI Gateway Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check commit format
        run: npx codemap ci check-commits --range origin/main..HEAD

      - name: Check file headers
        run: npx codemap ci check-headers

      - name: Generate AI feed and verify sync
        run: |
          npx codemap generate
          git diff --exit-code .codemap/ai-feed.txt || (echo "ERROR: AI feed is out of sync. Run 'codemap generate' and commit changes." && exit 1)

      - name: Assess risk
        run: npx codemap ci assess-risk --threshold=0.7

      - name: Check output contract
        run: npx codemap ci check-output-contract --schema-version v1.0.0 --top-k 8 --max-tokens 160
