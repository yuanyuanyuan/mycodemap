# [META] since:2026-03-04 | owner:release-team | stable:true
# [WHY] NPM package publishing workflow using OIDC trusted publishing

name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC trusted publishing
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      # OIDC trusted publishing - 不需要 token
      - name: Publish to NPM
        run: npm publish --access public
