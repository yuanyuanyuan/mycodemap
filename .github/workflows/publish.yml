# [META] since:2026-03-04 | owner:release-team | stable:true
# [WHY] NPM package publishing workflow - 使用 OIDC Trusted Publishing

name: Publish to NPM

on:
  # 方式1: 推送 v* 标签时自动发布
  push:
    tags:
      - 'v*'
  
  # 方式2: 手动触发（推荐用于首次发布或特殊情况）
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 0.2.0)，留空则使用 package.json 中的版本'
        required: false
        type: string

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 用于创建 GitHub Release
      id-token: write  # 用于 OIDC trusted publishing (必需)

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 获取完整历史用于生成 changelog

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Debug OIDC Configuration
        run: |
          echo "=== OIDC Debug Info ==="
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Ref: ${{ github.ref }}"
          echo "Action: ${{ github.action }}"
          echo "Actor: ${{ github.actor }}"
          echo "Job: ${{ github.job }}"
          echo "======================="

      - name: Get version from package.json
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Validate version
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "❌ Error: 无法从 package.json 读取版本号"
            exit 1
          fi
          echo "✅ Version: $VERSION"

      - name: Check tag matches version (tag 触发时)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=${{ steps.package-version.outputs.version }}
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Error: Git tag version (v$TAG_VERSION) 与 package.json 版本 ($PKG_VERSION) 不匹配"
            echo "请确保:"
            echo "  1. 更新 package.json 中的 version 字段"
            echo "  2. 创建匹配的 git tag: git tag v$PKG_VERSION"
            echo "  3. 推送 tag: git push origin v$PKG_VERSION"
            exit 1
          fi
          echo "✅ Tag version matches package.json version"

      - name: Determine npm dist-tag
        id: npm-tag
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          DIST_TAG="latest"
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
          fi
          if [ -z "$DIST_TAG" ]; then
            echo "❌ Error: 无法从版本号推导 npm dist-tag"
            exit 1
          fi
          echo "dist-tag=$DIST_TAG" >> $GITHUB_OUTPUT
          echo "NPM dist-tag: $DIST_TAG"

      - name: Install dependencies
        run: npm ci

      - name: Run pre-release AI documentation check
        run: npm run docs:check:pre-release

      - name: Run typecheck
        run: npm run typecheck

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run workflow E2E guardrail
        run: npm run test:e2e

      - name: Build package
        run: npm run build

      - name: Validate package contents
        run: npm run validate-pack

      # 使用 OIDC Trusted Publishing 或 NPM_TOKEN 发布
      # npm 官方当前要求 trusted publishing 使用 npm CLI >= 11.5.1、Node >= 22.14.0
      # OIDC 路径下 provenance 会自动生成，不需要额外传 --provenance
      # 若显式配置了 NPM_TOKEN，则保留 token fallback 以应对 registry/OIDC 偶发问题
      - name: Publish to NPM
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          DIST_TAG="${{ steps.npm-tag.outputs.dist-tag }}"
          if [ -n "$NPM_TOKEN" ]; then
            echo "Using NPM_TOKEN authentication (fallback for OIDC bug)"
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
            npx npm@11.5.1 publish --access public --tag "$DIST_TAG" --provenance --registry https://registry.npmjs.org
          else
            echo "Using OIDC Trusted Publishing"
            npx npm@11.5.1 publish --access public --tag "$DIST_TAG" --registry https://registry.npmjs.org
          fi

      - name: Generate Release Notes
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        id: release-notes
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          
          # 从 CHANGELOG.md 提取当前版本的变更记录
          if [ -f CHANGELOG.md ]; then
            # 提取当前版本的变更内容（两个版本标题之间的内容）
            NOTES=$(awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -1)
            if [ -n "$NOTES" ]; then
              echo "Extracted release notes from CHANGELOG.md"
            else
              NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
            fi
          else
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          
          # 转义特殊字符用于 GitHub Actions 输出
          NOTES="${NOTES//'%'/'%25'}"
          NOTES="${NOTES//$'\n'/'%0A'}"
          NOTES="${NOTES//$'\r'/'%0D'}"
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release v${{ steps.package-version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.package-version.outputs.version, '-') }}
          body: |
            ${{ steps.release-notes.outputs.notes }}

            ---

            ## Installation

            ```bash
            npm install @mycodemap/mycodemap@${{ steps.package-version.outputs.version }}
            ```

            ## AI Documentation

            This version includes updated AI-friendly documentation:
            - [AI Guide](https://github.com/${{ github.repository }}/blob/main/AI_GUIDE.md)
            - [llms.txt](https://github.com/${{ github.repository }}/blob/main/llms.txt)
