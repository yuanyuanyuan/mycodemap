# [META] since:2026-03-04 | owner:release-team | stable:true
# [WHY] NPM package publishing workflow - 支持 tag 触发和手动触发

name: Publish to NPM

on:
  # 方式1: 推送 v* 标签时自动发布
  push:
    tags:
      - 'v*'
  
  # 方式2: 手动触发（推荐用于首次发布或特殊情况）
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 0.2.0)，留空则使用 package.json 中的版本'
        required: false
        type: string

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 用于创建 GitHub Release
      id-token: write  # 用于 OIDC trusted publishing (可选)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史用于生成 changelog

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          # 如果使用 NPM_TOKEN 方式，取消下面这行的注释
          # scope: '@mycodemap'

      - name: Get version from package.json
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Validate version
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "❌ Error: 无法从 package.json 读取版本号"
            exit 1
          fi
          echo "✅ Version: $VERSION"

      - name: Check tag matches version (tag 触发时)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=${{ steps.package-version.outputs.version }}
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Error: Git tag version (v$TAG_VERSION) 与 package.json 版本 ($PKG_VERSION) 不匹配"
            echo "请确保:"
            echo "  1. 更新 package.json 中的 version 字段"
            echo "  2. 创建匹配的 git tag: git tag v$PKG_VERSION"
            echo "  3. 推送 tag: git push origin v$PKG_VERSION"
            exit 1
          fi
          echo "✅ Tag version matches package.json version"

      - name: Install dependencies
        run: npm ci

      - name: Run pre-release AI documentation check
        run: npm run docs:check:pre-release

      - name: Run typecheck
        run: npm run typecheck

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Validate package contents
        run: npm run validate-pack

      # 方式A: 使用 NPM_TOKEN (需要在 GitHub Secrets 中配置 NPM_TOKEN)
      - name: Publish to NPM (NPM_TOKEN)
        if: env.NPM_TOKEN != ''
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 方式B: 使用 OIDC Trusted Publishing (需要在 npm 网站上配置)
      - name: Publish to NPM (OIDC)
        if: env.NPM_TOKEN == ''
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: ${{ contains(steps.package-version.outputs.version, '-') }}
          body: |
            ## Changes
            
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
            
            ## Installation
            
            ```bash
            npm install @mycodemap/mycodemap@${{ steps.package-version.outputs.version }}
            ```
