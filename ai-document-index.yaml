# CodeMap AI Document Index
# 机器可读的 AI 文档索引，供 AI 大模型、搜索工具和 Agent 使用

project:
  name: CodeMap
  version: "0.5.2-beta.1"
  description: "TypeScript 代码地图生成与分析工具，为 AI 辅助开发提供结构化上下文"
  repository: "https://github.com/mycodemap/mycodemap"
  license: "MIT"
  
documentation:
  # AI 专属文档
  ai_documents:
    - id: ai-guide-main
      path: AI_GUIDE.md
      type: index
      priority: 1
      description: "AI 主指南 - 快速参考和命令选择决策树"
      keywords: 
        - "AI"
        - "Agent"
        - "快速开始"
        - "命令"
        - "决策树"
        - "速查表"
      audience: ai
      last_updated: "2026-03-22"
      
    - id: ai-discovery
      path: AI_DISCOVERY.md
      type: index
      priority: 1
      description: "AI 文档发现入口 - 通用发现机制"
      keywords:
        - "发现"
        - "导航"
        - "索引"
        - "search"
        - "SEO"
      audience: ai
      last_updated: "2026-03-22"
      
    - id: ai-quickstart
      path: docs/ai-guide/QUICKSTART.md
      type: guide
      priority: 2
      description: "AI 快速开始指南 - 场景到命令的映射"
      keywords:
        - "快速开始"
        - "决策树"
        - "场景"
        - "命令选择"
        - "workflow"
      audience: ai
      last_updated: "2026-03-22"
      
    - id: ai-commands
      path: docs/ai-guide/COMMANDS.md
      type: reference
      priority: 3
      description: "完整 CLI 命令参考，包含所有命令和选项"
      keywords:
        - "命令"
        - "CLI"
        - "参数"
        - "选项"
        - "generate"
        - "query"
        - "analyze"
        - "impact"
      audience: ai
      last_updated: "2026-03-22"
      
    - id: ai-output
      path: docs/ai-guide/OUTPUT.md
      type: reference
      priority: 3
      description: "JSON 输出结构解析，包含 TypeScript 接口定义"
      keywords:
        - "JSON"
        - "输出"
        - "TypeScript"
        - "接口"
        - "解析"
        - "schema"
      audience: ai
      last_updated: "2026-03-22"
      
    - id: ai-patterns
      path: docs/ai-guide/PATTERNS.md
      type: guide
      priority: 2
      description: "标准工作流模式 - 6种常见任务的标准流程"
      keywords:
        - "模式"
        - "工作流"
        - "最佳实践"
        - "示例"
        - "首次接触"
        - "重构"
        - "修复 Bug"
      audience: ai
      last_updated: "2026-03-22"
      
    - id: ai-prompts
      path: docs/ai-guide/PROMPTS.md
      type: template
      priority: 2
      description: "即用型提示词模板 - 可直接使用或改编"
      keywords:
        - "提示词"
        - "模板"
        - "prompt"
        - "示例"
        - "项目理解"
        - "影响分析"
        - "代码搜索"
      audience: ai
      last_updated: "2026-03-22"
      
    - id: ai-integration
      path: docs/ai-guide/INTEGRATION.md
      type: guide
      priority: 4
      description: "集成指南、错误处理和边界情况"
      keywords:
        - "集成"
        - "MCP"
        - "错误处理"
        - "故障排除"
        - "Skill"
        - "Agent"
      audience: ai
      last_updated: "2026-03-22"
      
    - id: ai-guide-readme
      path: docs/ai-guide/README.md
      type: index
      priority: 1
      description: "AI 文档目录索引"
      keywords:
        - "索引"
        - "导航"
        - "目录"
      audience: ai
      last_updated: "2026-03-22"

  # 人类用户文档
  human_documents:
    - id: readme
      path: README.md
      type: index
      description: "人类用户主入口，包含特性介绍和安装指南"
      audience: human
      
    - id: setup-guide
      path: docs/SETUP_GUIDE.md
      type: guide
      description: "详细的安装、配置和使用指南"
      audience: human
      
    - id: ai-assistant-setup
      path: docs/AI_ASSISTANT_SETUP.md
      type: guide
      description: "AI 助手集成配置指南 (Kimi/Claude/Codex)"
      audience: human
      
    - id: changelog
      path: CHANGELOG.md
      type: reference
      description: "版本变更日志"
      audience: all

  # 约束和规范文档
  constraint_documents:
    - id: agents
      path: AGENTS.md
      type: constraint
      description: "仓库级 AI 协议和强约束"
      keywords:
        - "约束"
        - "协议"
        - "红线"
        - "任务分级"
      audience: ai
      required_reading: true
      
    - id: claude
      path: CLAUDE.md
      type: guide
      description: "Claude/Codex 执行手册"
      keywords:
        - "执行手册"
        - "验收清单"
        - "检索优先级"
      audience: ai
      required_reading: true
      
    - id: architecture
      path: ARCHITECTURE.md
      type: reference
      description: "系统架构总图和模块边界"
      keywords:
        - "架构"
        - "MVP3"
        - "分层"
        - "模块"
      audience: ai

# 导航和发现
navigation:
  start_here: AI_GUIDE.md
  for_ai: docs/ai-guide/
  for_humans: README.md
  discovery: AI_DISCOVERY.md
  index: ai-document-index.yaml
  constraints: AGENTS.md
  
  quick_access:
    - name: "命令决策树"
      path: docs/ai-guide/QUICKSTART.md#决策流程图
    - name: "提示词模板"
      path: docs/ai-guide/PROMPTS.md
    - name: "JSON 输出结构"
      path: docs/ai-guide/OUTPUT.md
    - name: "完整命令列表"
      path: docs/ai-guide/COMMANDS.md

# 关键词映射（用于搜索发现）
keywords_mapping:
  "项目理解":
    - docs/ai-guide/QUICKSTART.md
    - docs/ai-guide/PROMPTS.md#项目理解
  
  "代码搜索":
    - docs/ai-guide/QUICKSTART.md
    - docs/ai-guide/PROMPTS.md#代码搜索
  
  "影响分析":
    - docs/ai-guide/PATTERNS.md#模式-b-实现新功能
    - docs/ai-guide/PROMPTS.md#变更影响分析
  
  "重构":
    - docs/ai-guide/PATTERNS.md#模式-c-重构代码
    - docs/ai-guide/PROMPTS.md#重构评估
  
  "CLI 命令":
    - docs/ai-guide/COMMANDS.md
    - AI_GUIDE.md#cli-命令参考
  
  "JSON 输出":
    - docs/ai-guide/OUTPUT.md
  
  "错误处理":
    - docs/ai-guide/INTEGRATION.md#错误处理

# 机器可读的命令索引
cli_commands:
  generate:
    description: "生成代码地图"
    ai_use_case: "首次理解项目结构"
    priority: required
    
  query:
    description: "查询符号、模块、依赖"
    ai_use_case: "查找代码定义"
    priority: high
    
  analyze:
    description: "统一分析入口"
    ai_use_case: "多意图智能分析"
    priority: high
    options:
      - impact
      - dependency
      - complexity
      - search
      - overview
      - refactor
      - reference
      - documentation
      
  impact:
    description: "影响范围分析"
    ai_use_case: "评估变更影响"
    priority: high
    
  deps:
    description: "依赖分析"
    ai_use_case: "理解模块关系"
    priority: medium
    
  cycles:
    description: "循环依赖检测"
    ai_use_case: "发现架构问题"
    priority: medium
    
  complexity:
    description: "复杂度分析"
    ai_use_case: "评估代码质量"
    priority: medium
    
  ci:
    description: "CI 门禁"
    ai_use_case: "代码质量检查"
    priority: low
    
  workflow:
    description: "工作流编排"
    ai_use_case: "复杂任务管理"
    priority: low
    
  server:
    description: "HTTP API 服务器"
    ai_use_case: "远程访问能力"
    priority: low

# 版本兼容性
version_compatibility:
  current: "0.4.1"
  min_supported: "0.4.1"
  breaking_changes: []
