# 任务元数据
# 用于任务追溯和复用

metadata:
  task_id: ""              # 任务唯一标识
  task_name: ""            # 任务名称
  version: "1.0.0"         # 当前版本
  created_at: ""           # 创建时间（ISO 8601）
  updated_at: ""           # 更新时间

# 任务属性
task:
  type: ""                 # code_generation/migration/refactoring/optimization/review
  difficulty: ""            # easy/medium/hard
  estimated_minutes: 30   # 预估完成时间

# 能力维度
capabilities:
  tested:                  # 测试的能力
    - ""
  required_knowledge:      # 需要的知识
    - ""

# 陷阱设计
traps:
  - name: ""              # 陷阱名称
    description: ""       # 陷阱描述
    severity: ""          # critical/high/medium/low

# 反例场景
counter_examples:
  - user_type: ""        # 反例用户类型
    scenario: ""         # 不适用场景
    reason: ""           # 原因

# 三角色工作流（硬约束）
workflow:
  batch:
    requested_count: 0   # 本次请求任务数，必须 <= 5
    max_allowed: 5
  triad:
    generator:
      agent: ""          # 生成角色/agent 名称
      agent_definition: "" # .agents/{agent}.agent.md
      status: "pending"  # pending/completed/failed
      evidence: ""       # 证据（命令、报告或日志）
    qa:
      agent: ""          # 质量验收角色/agent 名称
      agent_definition: "" # .agents/{agent}.agent.md
      status: "pending"  # pending/completed/failed
      evidence: ""       # 证据（门禁或检查输出）
    supervisor:
      agent: ""          # 审核监督角色/agent 名称
      agent_definition: "" # .agents/{agent}.agent.md
      status: "pending"  # pending/completed/failed
      evidence: ""       # 证据（review 记录）
      semantic_review:
        prompt_template: "" # .agents/{supervisor}.semantic.prompt.md
        report_file: "SUPERVISOR_SEMANTIC_REVIEW.md"
        score: 0
        threshold: 85
        critical_failures: 0
        status: "pending"  # pending/completed/failed
  approved: false        # supervisor 最终审批结果

# 版本历史
version_history:
  - version: "1.0.0"
    date: ""
    changes: ""
